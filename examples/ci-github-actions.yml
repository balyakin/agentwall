name: AgentWall CI Gate Example

on: [workflow_dispatch]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl -fsSL https://agentwall.dev/install.sh | sh
      - run: agentwall run --mode strict --fail-on-blocked --json -- claude --headless < task.txt
