sanitizers:
  - id: anthropic_api_key
    pattern: 'sk-ant-(?:api|admin)\d{2}-[A-Za-z0-9_\-]{80,}'
    replacement: '***REDACTED:ANTHROPIC_KEY***'
    high_confidence: true

  - id: openai_api_key
    pattern: '\b(?:sk-proj-[A-Za-z0-9_\-]{20,}|sk-[A-Za-z0-9]{48})\b'
    replacement: '***REDACTED:OPENAI_KEY***'
    high_confidence: true

  - id: aws_access_key
    pattern: '\b(?:AKIA|ASIA)[0-9A-Z]{16}\b'
    replacement: '***REDACTED:AWS_ACCESS_KEY***'
    high_confidence: true

  - id: aws_secret_key
    pattern: '(?i)(aws.{0,20}?(?:secret|key)["''\s:=]+)([A-Za-z0-9/+=]{40})'
    replacement: '${1}***REDACTED:AWS_SECRET***'

  - id: github_token
    pattern: '\b(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36,}\b'
    replacement: '***REDACTED:GITHUB_TOKEN***'
    high_confidence: true

  - id: github_fine_grained
    pattern: '\bgithub_pat_[A-Za-z0-9_]{82}\b'
    replacement: '***REDACTED:GITHUB_PAT***'
    high_confidence: true

  - id: gcp_service_account
    pattern: '"private_key":\s*"-----BEGIN PRIVATE KEY-----[^"]+-----END PRIVATE KEY-----\\n"'
    replacement: '"private_key":"***REDACTED:GCP_KEY***"'
    high_confidence: true

  - id: google_api_key
    pattern: '\bAIza[0-9A-Za-z\-_]{35}\b'
    replacement: '***REDACTED:GOOGLE_API_KEY***'
    high_confidence: true

  - id: slack_token
    pattern: '\bxox[baprs]-[A-Za-z0-9\-]{10,}\b'
    replacement: '***REDACTED:SLACK_TOKEN***'

  - id: stripe_secret
    pattern: '\b(?:sk|rk)_live_[A-Za-z0-9]{24,}\b'
    replacement: '***REDACTED:STRIPE_SECRET***'
    high_confidence: true

  - id: jwt
    pattern: '\beyJ[A-Za-z0-9_\-]{10,}\.eyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b'
    replacement: '***REDACTED:JWT***'

  - id: private_key_block
    pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----[\s\S]+?-----END (?:RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'
    replacement: '***REDACTED:PRIVATE_KEY_BLOCK***'
    high_confidence: true

  - id: generic_bearer
    pattern: '(?i)bearer\s+[A-Za-z0-9_\-\.=]{20,}'
    replacement: 'Bearer ***REDACTED:BEARER***'

  - id: generic_secret_assignment
    pattern: '(?mi)((?:^|[\s"''])(?:[A-Za-z0-9_.-]*?(?:secret|token|password|passwd|api[_-]?key|private[_-]?key)[A-Za-z0-9_.-]*?)\s*[:=]\s*["'']?)([^\s"''#]{8,})(["'']?)'
    replacement: '${1}***REDACTED:GENERIC_SECRET***${3}'

  - id: env_dotfile
    pattern: '(?m)^[A-Z][A-Z0-9_]{2,}=(?:["''][^"''\n]{8,}["'']|[^\s"''#\n]{8,})'
    replacement: '***REDACTED:ENV_VAR***'
